baseURL: "https://pavelguzenfeld.com/"
languageCode: en-us
title: Pavel Guzenfeld
theme: PaperMod

paginate: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: Pavel Guzenfeld
  description: "Drone Avionics Software Engineer — C++23, ROS 2, real-time systems, open-source"
  keywords: [C++, Robotics, Drones, ROS2, PX4, Systems Programming, Open Source]
  author: Pavel Guzenfeld

  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false

  profileMode:
    enabled: true
    title: "Pavel Guzenfeld"
    subtitle: "Drone Avionics Software Engineer"
    imageUrl: "https://github.com/PavelGuzenfeld.png"
    imageWidth: 160
    imageHeight: 160
    imageTitle: "Pavel Guzenfeld"
    buttons:
      - name: Projects
        url: /projects/
      - name: Blog
        url: /posts/
      - name: Contact
        url: /contact/

  socialIcons:
    - name: github
      url: "https://github.com/PavelGuzenfeld"
    - name: linkedin
      url: "https://linkedin.com/in/pavelguzenfeld"
    - name: email
      url: "mailto:me@pavelguzenfeld.com"
    - name: rss
      url: "/index.xml"

  cover:
    hiddenInList: false
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 10
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
