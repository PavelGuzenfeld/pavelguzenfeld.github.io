baseURL: "https://pavelguzenfeld.com/"
languageCode: en-us
title: "Pavel Guzenfeld"
theme: PaperMod

pagination:
  pagerSize: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# Google Search Console flagged tag/category pages as "Crawled - currently not
# indexed" — Google sees them as thin aggregators that compete with the real
# posts. Mark them noindex, follow so Google still traverses to the posts but
# doesn't surface the tag page itself in results. Also drop them from the
# sitemap so we're not advertising URLs we've told Google to skip.
cascade:
  - target:
      kind: taxonomy
    params:
      robotsNoIndex: true
    sitemap:
      disable: true
  - target:
      kind: term
    params:
      robotsNoIndex: true
    sitemap:
      disable: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: Pavel Guzenfeld
  description: "Senior C++23 engineer building flight-critical avionics, navigation, and computer-vision pipelines for UAVs. ROS 2, PX4, GStreamer, Jetson. Available for consulting and contract work."
  keywords: [C++, Robotics, Drones, ROS2, PX4, Systems Programming, Open Source]
  author: Pavel Guzenfeld

  analytics:
    google:
      SiteVerificationTag: "6Wk9XWS8pq2UUIrcJHLEyCOn0Gtv0wNbShWavWFXqRc"

  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false

  homeInfoParams:
    Title: "UAV & Robotics Software Engineer — C++23"
    Content: "I design and implement flight-critical software for drones and robotics: navigation pipelines and computer vision. Available for consulting and contract work — remote or on-site."

  socialIcons:
    - name: github
      url: "https://github.com/PavelGuzenfeld"
    - name: linkedin
      url: "https://linkedin.com/in/pavelguzenfeld"
    - name: x
      url: "https://x.com/PavelGuzenfeld"
    - name: email
      url: "mailto:me@pavelguzenfeld.com"
    - name: rss
      url: "/index.xml"

  images:
    - /images/og-default.png

  cover:
    hiddenInList: false
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 10
    - identifier: consulting
      name: Consulting
      url: /consulting/
      weight: 15
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: rss
      name: RSS
      url: /index.xml
      weight: 50

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
