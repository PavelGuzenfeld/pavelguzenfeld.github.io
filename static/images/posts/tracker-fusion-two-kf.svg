<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="af" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <style>
      .an    { fill:#dcfce7; stroke:#16a34a; stroke-width:1.5; }
      .host  { fill:#f1f5f9; stroke:#64748b; stroke-width:1.5; }
      .inner { fill:#fef9c3; stroke:#ca8a04; stroke-width:1.3; }
      .io    { fill:#e0f2fe; stroke:#0284c7; stroke-width:1.5; }
      .name  { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; fill:#0f172a; }
      .sub   { font-size:10.5px; fill:#475569; }
      .edge  { stroke:#334155; stroke-width:1.6; fill:none; }
      .meta  { font-size:11px; fill:#b45309; font-weight:600; }
      .note  { font-size:11px; fill:#475569; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="819" height="469" fill="#ffffff" stroke="#e2e8f0"/>

  <!-- YOLO source -->
  <rect class="an" x="60" y="36" width="250" height="58" rx="7"/>
  <text class="name" x="185" y="60" text-anchor="middle">nvmminfer</text>
  <text class="sub"  x="185" y="78" text-anchor="middle">TensorRT YOLO · runs every frame</text>

  <!-- SAM source with nested secondary KF -->
  <rect class="an" x="470" y="20" width="300" height="118" rx="7"/>
  <text class="name" x="620" y="42" text-anchor="middle">nvmmsamurai · SAM2.1 tracker</text>
  <rect class="inner" x="486" y="56" width="268" height="64" rx="6"/>
  <text class="name" x="620" y="78" text-anchor="middle" font-size="12">secondary KF (KalmanBox)</text>
  <text class="sub"  x="620" y="95" text-anchor="middle">• candidate scoring</text>
  <text class="sub"  x="620" y="110" text-anchor="middle">• max-kf fast-frame extrapolation</text>

  <!-- measurement arrows into master KF -->
  <path class="edge" marker-end="url(#af)" d="M185,94 L185,210 L300,210 L300,248"/>
  <path class="edge" marker-end="url(#af)" d="M620,138 L620,210 L520,210 L520,248"/>
  <text class="meta" x="60"  y="170">best box · GstNvmmDetMeta</text>
  <text class="note" x="60"  y="186">GATED (Euclidean pixel radius)</text>
  <text class="meta" x="560" y="170">SAM box (full or "fast")</text>
  <text class="note" x="560" y="186">GstNvmmTrackMeta</text>
  <text class="note" x="560" y="200">trusted PRIMARY (ungated)</text>

  <!-- master KF -->
  <rect class="host" x="160" y="250" width="500" height="74" rx="8"/>
  <text class="name" x="410" y="276" text-anchor="middle">nvmmfusekf · master Kalman filter</text>
  <text class="sub"  x="410" y="296" text-anchor="middle">every frame:  predict(dt) → update(SAM) → update(YOLO if gated)</text>
  <text class="sub"  x="410" y="312" text-anchor="middle">declares "lost" on the primary → emits the upstream nvmm-reseed event</text>

  <!-- output -->
  <path class="edge" marker-end="url(#af)" d="M410,324 L410,360"/>
  <rect class="io" x="230" y="362" width="360" height="52" rx="7"/>
  <text class="name" x="410" y="384" text-anchor="middle">fused GstNvmmTrackMeta</text>
  <text class="sub"  x="410" y="401" text-anchor="middle">→ nvmmdrawdet overlay</text>

  <!-- future-refinement note -->
  <text class="note" x="410" y="446" text-anchor="middle">Today SAM is fused ungated whether full-inference or extrapolated; explicitly diluting "fast" SAM is a future refinement.</text>
</svg>
